<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaptopVerse — Your Premium Laptop Shop</title>
  <meta name="description" content="Shop the best laptops for gaming, business, ultrabook, and budget categories. Free shipping on orders over $500.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import products from './js/products.js';
    import { renderNavbar, renderFooter, renderProductCard, initNavbar, initGlobalListeners, initScrollAnimations } from './js/app.js';

    const featured = products.slice(0, 4);
    const popular = [...products].sort((a, b) => b.rating - a.rating).slice(0, 4);

    document.getElementById('app').innerHTML = `
      ${renderNavbar('home')}

      <!-- Hero Section -->
      <section class="hero" id="hero">
        <div class="container">
          <div class="hero__content">
            <div class="hero__text">
              <div class="hero__badge">🔥 New Arrivals Just Dropped</div>
              <h1 class="hero__title">
                Find Your Perfect
                <span class="line2">Laptop.</span>
              </h1>
              <p class="hero__subtitle">Browse our curated collection of laptops from top brands. Whether you're a gamer, professional, or student — we've got the right fit for you.</p>
              <div class="hero__cta">
                <a href="catalog" class="btn btn--primary btn--lg" id="hero-cta">Browse Catalog</a>
                <a href="#categories" class="btn btn--secondary btn--lg" id="hero-categories">View Categories</a>
              </div>
              <div class="hero__stats">
                <div>
                  <div class="hero__stat-value">${products.length}+</div>
                  <div class="hero__stat-label">Laptops</div>
                </div>
                <div>
                  <div class="hero__stat-value">4.9★</div>
                  <div class="hero__stat-label">Avg Rating</div>
                </div>
                <div>
                  <div class="hero__stat-value">Free</div>
                  <div class="hero__stat-label">Shipping $500+</div>
                </div>
              </div>
            </div>
            <div class="hero__image">
              <img src="img/hero.webp" alt="Featured Laptop">
            </div>
          </div>
        </div>
      </section>

      <!-- Categories -->
      <section class="section categories animate-in" id="categories">
        <div class="container">
          <div class="section-header">
            <div class="section-header__left">
              <span class="section-header__label">Browse by Category</span>
              <h2 class="section-header__title">Top Categories</h2>
            </div>
            <a href="catalog" class="btn btn--sm btn--outline">View All</a>
          </div>
          <div class="categories__grid">
            <a href="catalog?category=gaming" class="category-card" id="cat-gaming">
              <div class="category-card__icon">🎮</div>
              <div class="category-card__name">Gaming</div>
              <div class="category-card__count">${products.filter(p => p.category === 'gaming').length} laptops</div>
            </a>
            <a href="catalog?category=business" class="category-card" id="cat-business">
              <div class="category-card__icon">💼</div>
              <div class="category-card__name">Business</div>
              <div class="category-card__count">${products.filter(p => p.category === 'business').length} laptops</div>
            </a>
            <a href="catalog?category=ultrabook" class="category-card" id="cat-ultrabook">
              <div class="category-card__icon">💻</div>
              <div class="category-card__name">Ultrabook</div>
              <div class="category-card__count">${products.filter(p => p.category === 'ultrabook').length} laptops</div>
            </a>
            <a href="catalog?category=budget" class="category-card" id="cat-budget">
              <div class="category-card__icon">💰</div>
              <div class="category-card__name">Budget</div>
              <div class="category-card__count">${products.filter(p => p.category === 'budget').length} laptops</div>
            </a>
          </div>
        </div>
      </section>

      <!-- Trust Badges -->
      <section class="section animate-in" id="trust">
        <div class="container">
          <div class="trust-badges">
            <div class="trust-badge">
              <div class="trust-badge__icon">🚚</div>
              <div>
                <div class="trust-badge__title">Free Shipping</div>
                <div class="trust-badge__text">On orders over $500</div>
              </div>
            </div>
            <div class="trust-badge">
              <div class="trust-badge__icon">🔒</div>
              <div>
                <div class="trust-badge__title">Secure Payment</div>
                <div class="trust-badge__text">100% protected checkout</div>
              </div>
            </div>
            <div class="trust-badge">
              <div class="trust-badge__icon">↩️</div>
              <div>
                <div class="trust-badge__title">30-Day Returns</div>
                <div class="trust-badge__text">Hassle-free policy</div>
              </div>
            </div>
            <div class="trust-badge">
              <div class="trust-badge__icon">🛡️</div>
              <div>
                <div class="trust-badge__title">2-Year Warranty</div>
                <div class="trust-badge__text">Extended coverage</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Featured Laptops -->
      <section class="section animate-in" id="featured">
        <div class="container">
          <div class="section-header">
            <div class="section-header__left">
              <span class="section-header__label">Hand-Picked for You</span>
              <h2 class="section-header__title">Featured <span class="text-accent">Laptops</span></h2>
            </div>
            <a href="catalog" class="btn btn--sm btn--outline">View All</a>
          </div>
          <div class="product-grid">
            ${featured.map(p => renderProductCard(p)).join('')}
          </div>
        </div>
      </section>

      <!-- Popular Laptops -->
      <section class="section animate-in" id="popular">
        <div class="container">
          <div class="section-header">
            <div class="section-header__left">
              <span class="section-header__label">Community Favorites</span>
              <h2 class="section-header__title">Most <span class="text-accent">Popular</span></h2>
            </div>
            <a href="catalog" class="btn btn--sm btn--outline">View All</a>
          </div>
          <div class="product-grid">
            ${popular.map(p => renderProductCard(p)).join('')}
          </div>
        </div>
      </section>

      <!-- Newsletter -->
      <section class="section animate-in" id="newsletter">
        <div class="container">
          <div class="newsletter">
            <h2 class="newsletter__title">Stay in the Loop</h2>
            <p class="newsletter__text">Get exclusive deals, new arrivals, and tech tips delivered to your inbox.</p>
            <form class="newsletter__form" onsubmit="event.preventDefault();">
              <input type="email" class="newsletter__input" placeholder="Enter your email address" id="newsletter-email">
              <button type="submit" class="btn btn--primary" id="newsletter-submit">Subscribe</button>
            </form>
          </div>
        </div>
      </section>

      ${renderFooter()}
    `;

    initNavbar();
    initGlobalListeners(products);
    initScrollAnimations();
  </script>
</body>
</html>
